<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Moreen Petals • Handcrafted Flower Art</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6B2D8C;
            --secondary: #C5A059;
            --accent1: #D97998;
            --accent2: #4CB1C4;
            --accent3: #F4D03F;
            --background: #F9F7F2;
            --white: #FFFFFF;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 15px 40px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--background);
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .navbar {
            background: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo-text span {
            color: var(--secondary);
            font-size: 1rem;
            display: block;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-link:hover {
            background: var(--primary);
            color: white;
        }

        .nav-link i {
            font-size: 1.1rem;
        }

        .cart-link {
            position: relative;
            background: var(--secondary);
            color: white;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent1);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            min-height: calc(100vh - 80px);
            padding: 2rem 5%;
        }

        /* Hero Section */
        .hero-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            min-height: 600px;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .hero-content h1 span {
            color: var(--secondary);
            position: relative;
        }

        .hero-content h1 span::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 10px;
            background: var(--accent3);
            opacity: 0.3;
            z-index: -1;
        }

        .hero-content p {
            color: var(--text-light);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            color: white;
            box-shadow: 0 10px 20px rgba(107, 45, 140, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(107, 45, 140, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .hero-image {
            position: relative;
        }

        .hero-image img {
            width: 100%;
            border-radius: 30px;
            box-shadow: var(--shadow-hover);
        }

        .floating-badge {
            position: absolute;
            bottom: 30px;
            left: -30px;
            background: white;
            padding: 1rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Features Section */
        .features-section {
            padding: 4rem 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .section-title p {
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        /* Products Section */
        .products-section {
            padding: 4rem 0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-category {
            color: var(--secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .product-materials {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .original-price {
            font-size: 1rem;
            color: var(--text-light);
            text-decoration: line-through;
        }

        .discount-badge {
            background: var(--accent3);
            color: var(--text-dark);
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .add-to-cart {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            width: 100%;
            margin-top: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .add-to-cart:hover {
            background: var(--secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            color: white;
            border-radius: 30px 30px 0 0;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1rem;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: white;
            box-shadow: var(--shadow-hover);
            z-index: 1500;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 1.5rem;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: var(--primary);
        }

        .cart-item-price {
            color: var(--secondary);
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 2px solid #eee;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Profile Dashboard Styles */
        .profile-dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary);
        }

        .profile-info h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .stat-content h4 {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .stat-content p {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .profile-details {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--background);
            border-radius: 10px;
        }

        .detail-item i {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .detail-content h4 {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .detail-content p {
            font-weight: 500;
            color: var(--text-dark);
        }

        .orders-section {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h3 {
            color: var(--primary);
            font-size: 1.3rem;
        }

        .order-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .order-tab {
            padding: 0.5rem 1rem;
            border: none;
            background: var(--background);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .order-tab.active {
            background: var(--primary);
            color: white;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .order-card {
            border: 2px solid #eee;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .order-card:hover {
            border-color: var(--primary);
        }

        .order-header {
            background: var(--background);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .order-id {
            font-weight: 600;
            color: var(--primary);
        }

        .order-date {
            color: var(--text-light);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .order-status {
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-pending {
            background: var(--accent3);
            color: var(--text-dark);
        }

        .status-confirmed {
            background: var(--accent2);
            color: white;
        }

        .status-completed {
            background: var(--secondary);
            color: white;
        }

        .status-cancelled {
            background: #e74c3c;
            color: white;
        }

        .order-body {
            padding: 1.5rem;
        }

        .order-items {
            margin-bottom: 1rem;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--primary);
        }

        .order-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow-hover);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 3000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Demo Mode Banner */
        .demo-banner {
            background: var(--accent3);
            color: var(--text-dark);
            text-align: center;
            padding: 0.5rem;
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            z-index: 999;
            font-size: 0.9rem;
        }

        .demo-banner i {
            margin-right: 0.5rem;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 1024px) {
            .hero-section {
                gap: 2rem;
            }
            
            .hero-content h1 {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .logo {
                width: 100%;
                justify-content: center;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
                width: 100%;
            }

            .nav-link {
                padding: 0.5rem;
                font-size: 0.9rem;
            }

            .nav-link span {
                display: none;
            }

            .nav-link i {
                font-size: 1.3rem;
            }

            .hero-section {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 3rem;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .hero-buttons {
                justify-content: center;
            }

            .floating-badge {
                display: none;
            }

            .features-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .product-card {
                font-size: 0.9rem;
            }

            .product-name {
                font-size: 1rem;
            }

            .product-price {
                font-size: 1.1rem;
            }

            .add-to-cart {
                padding: 0.5rem;
                font-size: 0.9rem;
            }

            .cart-sidebar {
                max-width: 100%;
            }

            .modal-content {
                width: 95%;
                margin: 1rem;
            }

            .toast {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }

            .demo-banner {
                top: 120px;
                font-size: 0.8rem;
                padding: 0.3rem;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-stats {
                grid-template-columns: 1fr;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .order-header {
                flex-direction: column;
                align-items: flex-start;

            try {

                // Test authentication by checking if it's enabled
                await auth.fetchSignInMethodsForEmail('test@test.com');
                
                isFirebaseAvailable = true;

                // Enable offline persistence
                try {

                    console.log('Persistence error:', err);
                }
                
                // Check auth state
                auth.onAuthStateChanged((user) => {
                    currentUser = user;
                    if (user) {
                        console.log('User logged in:', user.email);
                        loadUserOrders();
                    }
                });
                
            } catch (error) {
                console.error('Firebase initialization error:', error);
                isFirebaseAvailable = false;
                
                // Show demo mode banner
                document.getElementById('demoBanner').style.display = 'block';
                
                // Use local storage for users
                initializeLocalAuth();
            }

        // Initialize local authentication (demo mode)
        function initializeLocalAuth() {
            // Load users from localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];
            
            // Check for saved current user
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                loadUserOrders();
            }
        }

        // Load user orders
        async function loadUserOrders() {
            if (!currentUser) return;
            
            userOrders = [];
            
            if (isFirebaseAvailable && db) {
                try {
                    const querySnapshot = await db.collection("orders")
                        .where("userId", "==", currentUser.uid)
                        .orderBy("orderDate", "desc")
                        .get();
                    
                    querySnapshot.forEach((doc) => {
                        userOrders.push({ id: doc.id, ...doc.data() });
                    });
                } catch (error) {
                    console.log('Error loading orders from Firebase:', error);
                }
            }
            
            // Load from localStorage as well (for demo mode)
            const localOrders = JSON.parse(localStorage.getItem('orders')) || [];
            const userLocalOrders = localOrders.filter(order => 
                order.userId === (currentUser?.uid || currentUser?.id)
            );
            
            // Merge orders
            userOrders = [...userOrders, ...userLocalOrders].sort((a, b) => 
                new Date(b.orderDate) - new Date(a.orderDate)
            );
        }

            // If no saved products, use sample products

            localStorage.setItem('products', JSON.stringify(products));
            
            // Try to load from Firebase if available
            if (isFirebaseAvailable && db) {
                try {
                    const querySnapshot = await db.collection("products").get();
                    if (!querySnapshot.empty) {
                        const firebaseProducts = [];
                        querySnapshot.forEach((doc) => {
                            firebaseProducts.push({ id: doc.id, ...doc.data() });
                        });
                        products = firebaseProducts;
                        localStorage.setItem('products', JSON.stringify(products));

        // Render Orders
        function renderOrders(orders) {
            if (!orders || orders.length === 0) {

        // Filter Orders
        window.filterOrders = function(status) {
            // Update tab active state
            document.querySelectorAll('.order-tab').forEach(tab => {
                tab.classList.remove('active');

            event.target.classList.add('active');
            
            // Filter orders
            const filteredOrders = status === 'all' 
                ? userOrders 
                : userOrders.filter(order => order.status === status);
            
            document.getElementById('ordersList').innerHTML = renderOrders(filteredOrders);

        // View Order Details

                    <div style="margin-top: 1.5rem;">

            modal.classList.add('active');

        // Cancel Order
        window.cancelOrder = function(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) return;
            
            // Update order status
            const orderIndex = userOrders.findIndex(o => o.id === orderId || o.id === orderId);
            if (orderIndex !== -1) {
                userOrders[orderIndex].status = 'cancelled';
                
                // Update in localStorage
                const localOrders = JSON.parse(localStorage.getItem('orders')) || [];
                const localOrderIndex = localOrders.findIndex(o => o.id === orderId);
                if (localOrderIndex !== -1) {
                    localOrders[localOrderIndex].status = 'cancelled';
                    localStorage.setItem('orders', JSON.stringify(localOrders));
                }
                
                showToast('Order cancelled successfully', 'success');
                showProfileDashboard(); // Refresh profile
            }
        };

        // Show Login Modal
        function showLoginModal() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `

        // Show Register Modal
        window.showRegisterModal = function() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h2><i class="fas fa-user-plus"></i> Register</h2>
                    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">

                        <input type="email" id="regEmail" placeholder="Email" required>
                    </div>

                    </button>
                    ${!isFirebaseAvailable ? `
                        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--accent3);">
                            <i class="fas fa-info-circle"></i> Demo Mode: Registration works with local storage
                        </p>
                    ` : ''}
                </div>
            `;
        };

        // Login Function
        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Please fill all fields', 'error');
                return;
            }

            if (isFirebaseAvailable && auth) {
                // Firebase login
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    currentUser = userCredential.user;
                    closeModal();
                    await loadUserOrders();
                    showToast('Login successful!', 'success');
                    showProfileDashboard();
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = 'Login failed. Please try again.';
                    if (error.code === 'auth/user-not-found') {
                        errorMessage = 'User not found. Please register.';
                    } else if (error.code === 'auth/wrong-password') {
                        errorMessage = 'Wrong password.';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = 'Invalid email format.';
                    }
                    showToast(errorMessage, 'error');
                }
            } else {
                // Demo mode login with local storage
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    currentUser = user;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    await loadUserOrders();
                    closeModal();
                    showToast('Login successful! (Demo Mode)', 'success');
                    showProfileDashboard();
                } else {
                    showToast('Invalid email or password', 'error');
                }
            }
        };

        // Register Function
        window.register = async function() {
            const userData = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                whatsapp: document.getElementById('regWhatsapp').value,
                address: document.getElementById('regAddress').value,
                createdAt: new Date().toISOString()
            };

            const password = document.getElementById('regPassword').value;

            // Validate all fields
            for (let key in userData) {
                if (!userData[key]) {
                    showToast('Please fill all fields', 'error');
                    return;
                }
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            if (isFirebaseAvailable && auth && db) {
                // Firebase registration
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(userData.email, password);
                    
                    await db.collection("users").add({
                        uid: userCredential.user.uid,
                        ...userData
                    });

                    currentUser = userCredential.user;
                    closeModal();
                    showToast('Registration successful!', 'success');
                    showProfileDashboard();
                } catch (error) {
                    console.error('Registration error:', error);
                    let errorMessage = 'Registration failed. Please try again.';
                    if (error.code === 'auth/email-already-in-use') {
                        errorMessage = 'Email already in use.';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = 'Invalid email format.';
                    } else if (error.code === 'auth/weak-password') {
                        errorMessage = 'Password is too weak.';
                    }
                    showToast(errorMessage, 'error');
                }
            } else {
                // Demo mode registration with local storage
                const users = JSON.parse(localStorage.getItem('users')) || [];
                
                // Check if email already exists
                if (users.some(u => u.email === userData.email)) {
                    showToast('Email already exists', 'error');
                    return;
                }
                
                // Add password to user data
                userData.password = password;
                userData.id = 'user_' + Date.now();
                
                users.push(userData);
                localStorage.setItem('users', JSON.stringify(users));
                
                // Auto login
                currentUser = userData;
                localStorage.setItem('currentUser', JSON.stringify(userData));
                
                closeModal();
                showToast('Registration successful! (Demo Mode)', 'success');
                showProfileDashboard();
            }
        };

        // Logout Function
        window.logout = async function() {
            if (isFirebaseAvailable && auth) {
                try {
                    await auth.signOut();
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }
            
            currentUser = null;
            userOrders = [];
            localStorage.removeItem('currentUser');
            closeModal();
            showToast('Logged out successfully!', 'success');
            showHome();
        };

        // Product Details
        window.showProductDetails = function(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const finalPrice = product.discount > 0 
                ? product.price * (1 - product.discount / 100) 
                : product.price;

            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h2>${product.name}</h2>
                    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <img src="${product.imageUrl || 'https://images.unsplash.com/photo-1582794543139-8ac9cb0f7b11?w=500'}" 
                         alt="${product.name}" 
                         style="width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-bottom: 1.5rem;">
                    
                    <p style="color: var(--text-light); line-height: 1.8; margin-bottom: 1.5rem;">
                        ${product.description}
                    </p>
                    
                    <div style="background: var(--background); padding: 1.5rem; border-radius: 15px; margin-bottom: 1.5rem;">
                        <p style="margin-bottom: 0.5rem;">
                            <i class="fas fa-leaf" style="color: var(--secondary);"></i> 
                            <strong>Materials:</strong> ${product.materials}
                        </p>
                        <p>
                            <i class="fas fa-tag" style="color: var(--secondary);"></i> 
                            <strong>Category:</strong> ${product.category}
                        </p>
                    </div>
                    
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <div>
                            <span style="font-size: 2rem; font-weight: bold; color: var(--primary);">₹${finalPrice.toFixed(2)}</span>
                            ${product.discount > 0 ? 
                                `<span style="margin-left: 1rem; color: var(--text-light); text-decoration: line-through;">₹${product.price.toFixed(2)}</span>` : ''}
                        </div>
                        <button class="btn btn-primary" onclick="addToCart('${product.id}'); closeModal();">
                            <i class="fas fa-shopping-cart"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        };

        // Cart Functions
        window.addToCart = function(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const finalPrice = product.discount > 0 
                ? product.price * (1 - product.discount / 100) 
                : product.price;

            const existingItem = cart.find(item => item.productId === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    productId: product.id,
                    name: product.name,
                    price: finalPrice,
                    quantity: 1,
                    imageUrl: product.imageUrl
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast('Added to cart!', 'success');
        };

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        window.showCart = function() {
            const sidebar = document.getElementById('cartSidebar');
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div style="text-align: center; padding: 3rem;">
                        <i class="fas fa-shopping-cart" style="font-size: 3rem; color: var(--primary); opacity: 0.3;"></i>
                        <p style="margin-top: 1rem;">Your cart is empty</p>
                    </div>
                `;
                cartTotal.textContent = '₹0.00';
            } else {
                let total = 0;
                cartItems.innerHTML = '';
                
                cart.forEach((item, index) => {
                    total += item.price * item.quantity;
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <img src="${item.imageUrl || 'https://images.unsplash.com/photo-1582794543139-8ac9cb0f7b11?w=100'}" 
                                 alt="${item.name}" 
                                 class="cart-item-image">
                            <div class="cart-item-details">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">₹${item.price.toFixed(2)} x ${item.quantity}</div>
                                <div class="cart-item-quantity">
                                    <button class="quantity-btn" onclick="updateCartQuantity(${index}, -1)">-</button>
                                    <span>${item.quantity}</span>
                                    <button class="quantity-btn" onclick="updateCartQuantity(${index}, 1)">+</button>
                                    <button class="quantity-btn" onclick="removeFromCart(${index})" style="background: #ff4444; color: white;">×</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                cartTotal.textContent = `₹${total.toFixed(2)}`;
            }

            sidebar.classList.add('active');
        };

        window.closeCart = function() {
            document.getElementById('cartSidebar').classList.remove('active');
        };

        window.updateCartQuantity = function(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showCart();
        };

        window.removeFromCart = function(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showCart();
            showToast('Item removed from cart', 'success');
        };

        // Checkout
        window.checkout = function() {
            if (!currentUser) {
                showToast('Please login to checkout', 'error');
                showLoginModal();
                return;
            }

            if (cart.length === 0) {
                showToast('Your cart is empty', 'error');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h2><i class="fas fa-lock"></i> Checkout</h2>
                    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <h3 style="color: var(--primary); margin-bottom: 1rem;">Order Summary</h3>
                    
                    ${cart.map(item => `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>${item.name} x${item.quantity}</span>
                            <span>₹${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `).join('')}
                    
                    <div style="display: flex; justify-content: space-between; margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--primary);">
                        <strong>Total:</strong>
                        <strong style="color: var(--primary);">₹${total.toFixed(2)}</strong>
                    </div>
                    
                    <p style="margin: 1.5rem 0; color: var(--text-light);">
                        <i class="fas fa-info-circle"></i>

                    </button>
                </div>
            `;
            
            modal.classList.add('active');
            closeCart();
        };

        // Place Order
        window.placeOrder = async function() {
            if (!currentUser) {
                showToast('Please login first', 'error');
                return;
            }

            const orderData = {
                userId: currentUser.uid || currentUser.id,
                customerEmail: currentUser.email,
                customerName: currentUser.name || currentUser.email,
                deliveryAddress: currentUser.address || '',
                items: cart,
                total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                status: 'pending',
                paymentStatus: 'pending',
                orderDate: new Date().toISOString()
            };

            if (isFirebaseAvailable && db) {
                // Firebase order
                try {
                    const docRef = await db.collection("orders").add(orderData);
                    orderData.id = docRef.id;
                    
                    // Clear cart
                    cart = [];
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    
                    // Add to user orders
                    userOrders.unshift(orderData);
                    
                    closeModal();
                    showToast('Order placed successfully! The seller will contact you soon.', 'success');
                } catch (error) {
                    console.error('Order error:', error);
                    showToast('Error placing order. Please try again.', 'error');
                }
            } else {
                // Demo mode order
                const orders = JSON.parse(localStorage.getItem('orders')) || [];
                orderData.id = 'order_' + Date.now();
                orders.push(orderData);
                localStorage.setItem('orders', JSON.stringify(orders));
                
                // Add to user orders
                userOrders.unshift(orderData);
                
                // Clear cart
                cart = [];
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                
                closeModal();
                showToast('Order placed successfully! (Demo Mode)', 'success');
            }
        };

        // Send Message
        window.sendMessage = function() {
            const name = document.getElementById('contactName').value;
            const email = document.getElementById('contactEmail').value;
            const phone = document.getElementById('contactPhone').value;
            const message = document.getElementById('contactMessage').value;

            // Save message to localStorage in demo mode
            const messages = JSON.parse(localStorage.getItem('messages')) || [];
            messages.push({
                name,
                email,
                phone,
                message,
                date: new Date().toISOString()
            });
            localStorage.setItem('messages', JSON.stringify(messages));

            showToast('Message sent! We\'ll get back to you soon.', 'success');
            
            // Clear form
            document.getElementById('contactName').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactPhone').value = '';
            document.getElementById('contactMessage').value = '';
        };

        // Toast Notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}" 
                   style="color: ${type === 'success' ? '#4CAF50' : '#f44336'};"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Modal Functions
        window.closeModal = function() {
            document.getElementById('modal').classList.remove('active');
        };
    </script>
</body>
</html>
